name: Build Project

on:
  push:
    paths-ignore:
      - '.github/*'
      - '*.md'
      - "*.yml"
  pull_request:
    paths-ignore:
      - '.github/*'
      - '*.md'
      - "*.yml"
  workflow_dispatch:
    # allow manual trigger

jobs:
  build:
    permissions:
      contents: read
      packages: read
    uses: ExtractIntoVoid/workflows/.github/workflows/build_project.yml@main
    with:
      ProjName: RENAME_ME
#      uploadName: RENAME_ME
#      config: Release
#      runner: windows-latest
    secrets:
      TOKEN: ${{ secrets.GITHUB_TOKEN }}